{% extends "base.html" %}
{% block content %}

<style>

.register-container{
    display:flex;
    align-items:center;
    justify-content:center;
}

.register-card{
    border:none;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    overflow:hidden;
}

.register-left{
    background:linear-gradient(135deg,#11998e,#38ef7d);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.register-left h3{
    font-weight:600;
}

.register-right{
    padding:40px;
}

.input-group-text{
    background:#f1f3f6;
}

.register-btn{
    width:100%;
    padding:12px;
    border-radius:30px;
    font-size:17px;
    transition:0.3s;
}

.register-btn:hover{
    transform:scale(1.05);
}

.password-toggle{
    cursor:pointer;
}

</style>


<div class="container register-container">

<div class="row register-card col-lg-10">

<!-- LEFT SIDE -->

<div class="col-md-6 register-left text-center">

<h3>Create Account ✨</h3>

<p class="mt-3">
Join the AI-powered handwritten text analysis system
and evaluate handwritten answers automatically using OCR and LLM technology.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135789.png"
     style="width:200px;margin-top:20px">

</div>


<!-- RIGHT SIDE -->

<div class="col-md-6 register-right">

<h3 class="mb-4 text-center">📝 Register</h3>

<form method="POST">

<div class="mb-3">

<label class="form-label">Username</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input type="text" name="username" class="form-control" placeholder="Create username" required>

</div>

</div>


<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input type="password" name="password" id="password" class="form-control" placeholder="Create password" required>

<span class="input-group-text password-toggle" onclick="togglePassword()">
<i class="fa fa-eye"></i>
</span>

</div>

</div>


<button type="submit" class="btn btn-success register-btn">
Create Account
</button>


<div class="text-center mt-3">

<p>Already have an account? 
<a href="{{ url_for('login') }}">Login</a>
</p>

</div>

</form>

</div>

</div>

</div>


<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}
else{
x.type="password";
}

}

</script>

{% endblock %}
